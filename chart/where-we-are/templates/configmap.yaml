apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "where-we-are.fullname" . }}-caldav
  labels:
    {{- include "where-we-are.labels" . | nindent 4 }}
data:
  # Mounted as files under CALDAV_CONFIG_DIR. Edit this ConfigMap to change
  # filters without restarting the pod; the app re-reads on each sync poll.
  CALDAV_CALENDARS: {{ .Values.app.caldav.calendars | quote }}
  CALDAV_EVENT_WINDOW_MONTHS: {{ .Values.app.caldav.eventWindowMonths | quote }}
