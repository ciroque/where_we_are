{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "where-we-are.fullname" . }}
  labels:
    {{- include "where-we-are.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "where-we-are.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    # autoscaling/v2 requires at least one metric; fail loudly if misconfigured.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ required "autoscaling.targetCPUUtilizationPercentage is required when autoscaling.enabled is true" .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
