apiVersion: v1
kind: Secret
metadata:
  name: {{ include "where-we-are.fullname" . }}
  labels:
    {{- include "where-we-are.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY_BASE: {{ required "Values.secretKeyBase must be set and stable across upgrades" .Values.secretKeyBase | quote }}
  {{- if .Values.caldav.username }}
  CALDAV_USERNAME: {{ .Values.caldav.username | quote }}
  {{- end }}
  {{- if .Values.caldav.password }}
  CALDAV_PASSWORD: {{ .Values.caldav.password | quote }}
  {{- end }}
