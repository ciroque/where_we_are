apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "where-we-are.fullname" . }}
  labels:
    {{- include "where-we-are.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "where-we-are.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "where-we-are.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "where-we-are.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "where-we-are.fullname" . }}
                  key: secret-key-base
            {{- if .Values.app.caldav.username }}
            - name: CALDAV_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "where-we-are.fullname" . }}
                  key: caldav-username
            {{- end }}
            {{- if .Values.app.caldav.password }}
            - name: CALDAV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "where-we-are.fullname" . }}
                  key: caldav-password
            {{- end }}
            - name: PHX_SERVER
              value: "true"
            - name: PHX_HOST
              value: {{ .Values.app.phxHost | quote }}
            - name: PORT
              value: "4000"
            - name: MIX_ENV
              value: {{ .Values.app.environment | quote }}
            - name: CALDAV_URL
              value: {{ .Values.app.caldav.url | quote }}
            - name: CALDAV_CALENDARS
              value: {{ .Values.app.caldav.calendars | quote }}
            - name: CALDAV_EVENT_WINDOW_MONTHS
              value: {{ .Values.app.caldav.eventWindowMonths | quote }}
            - name: CALDAV_EXPAND_RECURRENCES
              value: {{ .Values.app.caldav.expandRecurrences | quote }}
            - name: CALDAV_POLL_MINUTES
              value: {{ .Values.app.caldav.pollMinutes | quote }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
