# Default values for where-we-are.
# Override with -f my-values.yaml or --set for production.

replicaCount: 1

image:
  # GHCR image from .github/workflows/build-signed-image.yml
  repository: ghcr.io/ciroque/where_we_are
  pullPolicy: IfNotPresent
  # Prefer an immutable tag (run number or sha) over "latest" in production.
  tag: "latest"

# Required for private GHCR packages (create a pull secret with a PAT).
#   kubectl create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USER \
#     --docker-password=YOUR_PAT
imagePullSecrets: []
# imagePullSecrets:
#   - name: ghcr-pull

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 4000
  targetPort: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  # enabled: true
  # className: nginx
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  # hosts:
  #   - host: where.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - secretName: where-we-are-tls
  #     hosts:
  #       - where.example.com
  hosts:
    - host: where-we-are.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Optional cert-manager Certificate CR (requires cert-manager installed).
# Prefer ingress annotations for many setups; enable this if you manage certs separately.
certificate:
  enabled: false
  secretName: where-we-are-tls
  issuerName: letsencrypt-prod
  issuerKind: ClusterIssuer
  dnsNames: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Elixir releases can take a few seconds to boot; keep initial delays generous.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Keep disabled: calendar state is in-memory per pod (no shared store).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# With replicaCount > 1 each pod has its own calendar cache.
# Prefer a single replica unless you add sticky sessions.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

env:
  PHX_SERVER: "true"
  # Public hostname clients use (must match ingress host for LiveView/WebSockets).
  PHX_HOST: "localhost"
  PORT: "4000"

# Secret key base used by Phoenix to sign/encrypt cookies (SECRET_KEY_BASE).
# Generate with: mix phx.gen.secret
# Must be set and remain stable across upgrades.
secretKeyBase: ""

# CalDAV configuration for calendar sync
caldav:
  # Comma-separated calendar display names; empty = all calendars from the server.
  calendars: ""
  url: "https://caldav.icloud.com"
  username: ""
  password: ""
  eventWindowMonths: 6
  expandRecurrences: true
  pollMinutes: 10

# Additional environment variables (list of {name, value} or valueFrom maps)
extraEnv: []

# Additional envFrom sources (configMapRef / secretRef)
extraEnvFrom: []
