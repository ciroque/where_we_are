# Default values for where-we-are (aligned with charts/exertrax_fitness_ng).

replicaCount: 1

image:
  repository: ghcr.io/ciroque/where_we_are
  pullPolicy: IfNotPresent
  # Immutable image pin (preferred). Set at install time:
  #   --set image.digest=sha256:...
  digest: ""

# Cluster-local secret that can pull private GHCR packages (same as ExerTrax).
imagePullSecrets:
  - name: ghcr-package-read

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # false = use "default" (or serviceAccount.name if set; must already exist).
  # true  = create a chart-managed ServiceAccount.
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  # External service port (what Ingress targets)
  port: 80
  # Container port (Phoenix / Bandit)
  targetPort: 4000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    - host: where-we-are.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - where-we-are.local
      secretName: where-we-are-tls-secret

certificate:
  enabled: true
  secretName: where-we-are-tls-secret
  issuerName: letsencrypt-dns
  issuerKind: ClusterIssuer
  dnsNames:
    - where-we-are.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration (Phoenix + CalDAV)
app:
  # Generate with: mix phx.gen.secret
  # Keep stable across upgrades.
  secretKeyBase: ""
  environment: "prod"
  # Public hostname browsers use (must match ingress host for LiveView).
  phxHost: "where-we-are.local"
  caldav:
    username: ""
    password: ""
    url: "https://caldav.icloud.com"
    # Comma-separated calendar display names; empty = all calendars.
    calendars: ""
    eventWindowMonths: 6
    expandRecurrences: true
    pollMinutes: 10
