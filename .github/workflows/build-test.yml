name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-24.04

    env:
      MIX_HOME: ${{ github.workspace }}/.mix
      HEX_HOME: ${{ github.workspace }}/.hex
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Mix environment directories
        run: |
          mkdir -p "$MIX_HOME/archives"
          mkdir -p "$HEX_HOME"

      - name: Set up Elixir
        id: beam
        uses: erlef/setup-beam@v1.20.4
        with:
          elixir-version: '1.19.5'
          otp-version: '27.3.4'
          version-type: strict
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ${{ github.workspace }}/.mix
            ${{ github.workspace }}/.hex
          key: ${{ runner.os }}-ubuntu-24.04-mix-${{ steps.beam.outputs['elixir-version'] }}-${{ steps.beam.outputs['otp-version'] }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-ubuntu-24.04-mix-${{ steps.beam.outputs['elixir-version'] }}-${{ steps.beam.outputs['otp-version'] }}-
            ${{ runner.os }}-ubuntu-24.04-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test
